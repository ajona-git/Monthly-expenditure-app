<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal expense tracker</title>
    <link rel="stylesheet" href="./styles/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudfare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="header">
      <h1>Good Morning ajona</h1>
      <div class="header-controls">
        <div class="dropdown">Daily <i class="fes fa-chevron-down"></i></div>
        <div class="date-picker">
          <i class="fes fa-calender"></i>
          19 june 2026
        </div>
        <div class="export-btn">
          <i class="fas fa-download"></i>
          Export
        </div>
      </div>
    </div>
    <div class="main-content">
      <div class="dashboard-grid">
        <div class="card">
          <div class="card-header">
            <h1 class="card-title">Monthly Income</h1>
            <button class="card-menu"><i class="fas fa-ellipses"></i></button>
          </div>
          <div class="amount income-amount">$,2876.00</div>
          <div class="change">
            <i class="fas fa-arrow-up"></i
            ><!-- percentage increase or decrease -->
            12% since last month
          </div>
        </div>
        <div class="card">
          <div class="card-header">
            <h1 class="card-title">Monthly Expenses</h1>
            <button class="card-menu"><i class="fas fa-ellipses"></i></button>
          </div>
          <div class="amount income-amount">$1,176.00</div>
          <div class="change">
            <i class="fas fa-arrow-up"></i
            ><!-- percentage increase or decrease -->
            12% since last month
          </div>
        </div>
        <div class="card my-card">
          <div class="card-header">
            <h1 class="card-title">My Card</h1>
            <button class="card-menu" style="color:white">
              ...<i class="fas fa-ellipses"></i>
            </button>
          </div>
          <div style="font-size:.75rem; opacity:0.8; margin-bottom:1rem">
            Linked to your primary wallet
          </div>

          <div class="card-chip"></div>
          <div class="card-number">5455 6789 6547 8765</div>
          <div class="card-holder">User</div>
          <div class="card-logo">
            <div class="card-logo-circle logo-red"></div>
            <div class="card-logo-circle logo-orange"></div>
          </div>

          <div class="spending-section">
            <div style="margin-bottom:.5rem; font-size:.875rem; opacity:.9">
              Spending limit
            </div>
            <div class="spending-limit">$644.77</div>
            <div class="spending-used">used from $964.77</div>
            <div class="progress-bar">
              <div class="progress-fill"></div> 
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="./scripts/script.js"></script>
  </body>
</html>
